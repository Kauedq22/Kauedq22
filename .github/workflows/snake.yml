name: Generate snake animation

on:
  schedule:
    # Roda a cada 12 horas
    - cron: "0 */12 * * *"
  
  # Permite rodar manualmente na aba Actions
  workflow_dispatch:
  
  # Roda a cada push na branch principal
  push:
    branches:
      - main
      - master

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Gera o gráfico da cobrinha a partir do usuário dono do repo
      - name: generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      # Envia o conteúdo de 'dist' para a branch 'output'
      - name: push github-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
